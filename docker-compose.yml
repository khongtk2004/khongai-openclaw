version: '3.8'

services:
  khongai:
    image: ghcr.io/khongai/khongai-openclaw:latest
    container_name: khongai
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - khongai-data:/home/node/.khongai
      - khongai-workspace:/home/node/.khongai/workspace
      - khongai-logs:/home/node/.khongai/logs
      - ./config:/app/config:ro
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_USER_IDS=${ADMIN_USER_IDS}
      - KHONGAI_VERSION=latest
    networks:
      - khongai-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  khongai-network:
    driver: bridge

volumes:
  khongai-data:
  khongai-workspace:
  khongai-logs:
